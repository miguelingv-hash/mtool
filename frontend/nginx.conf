server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Tamaño máximo del cuerpo (carga de CSV grande + certificado .pfx).
    # Subido a 512MB para soportar CSVs Newman con cientos de miles de filas.
    client_max_body_size 512m;

    # Cache largo para assets versionados (hashed por CRA)
    location /static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Proxy de la API al backend (mismo origen ⇒ sin CORS)
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts ampliados a 30 min para soportar imports masivos de CSVs
        # Newman (cientos de miles de filas, parse + insert en lotes de 2.000)
        proxy_read_timeout  1800s;
        proxy_send_timeout  1800s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
