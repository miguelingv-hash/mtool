# Redirige todo HTTP → HTTPS
server {
  listen 80 default_server;
  server_name _;

  # Healthcheck en plano para que docker pueda comprobarlo sin TLS
  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl default_server;
  http2 on;
  server_name _;

  # Cert self-signed generado durante el build de la imagen
  ssl_certificate     /etc/nginx/certs/selfsigned.crt;
  ssl_certificate_key /etc/nginx/certs/selfsigned.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  client_max_body_size 50M;

  # Proxy de la API al backend (servicio docker-compose "backend")
  location /api/ {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # SPA — fallback a index.html
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;

    # Cache fuerte para assets con hash en el nombre
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
